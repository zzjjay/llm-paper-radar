# Seed papers for the radar.
#
# Consumed by `sources/semantic_scholar.py` — only the `id` field is
# load-bearing (it queries the citations of each seed). `name` and
# `category` are documentation; safe to edit.
#
# Categories mirror the bucket enum in prompts/relevance.md:
#   ptq, qat, low_bits, kv_cache, pruning_distill, diffusion
#
# When `id` is unknown, use `arXiv:????` and the seed is skipped at
# fetch time (semantic_scholar.py filters trailing ????).

