name: Bug report
description: Pipeline failure, broken digest, malformed output, or anything that "should work but doesn't".
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      placeholder: "The 2026-05-25 digest is missing the KV cache section even though scored JSON has KV cache papers."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      placeholder: "Bucket should render whenever scored/<date>.json has at least one paper with topic_bucket=kv_cache and hard_gate=false."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Date(s) affected, command run, link to the broken digest file, or log excerpt. The more concrete the better.
      placeholder: |
        - digest: digests/2026-05-25.md
        - command: `./scripts/daily.sh`
        - log line: `render: wrote digest for 2026-05-25` but section is empty
    validations:
      required: false

  - type: input
    id: commit
    attributes:
      label: Commit SHA (if known)
      description: From the digest header or `git rev-parse HEAD`.
    validations:
      required: false
