name: Paper suggestion
description: Suggest a missed paper, or flag one that was wrongly included / wrongly bucketed.
title: "[paper] "
labels: ["paper-suggestion"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: Kind of suggestion
      options:
        - Missed paper (should be in the digest, isn't)
        - Wrongly included (in the digest, shouldn't be)
        - Wrong bucket (in the digest, but in the wrong bucket)
    validations:
      required: true

  - type: input
    id: arxiv
    attributes:
      label: arXiv ID
      description: e.g. `2605.19561`. If no arXiv link, paste the venue/URL instead.
      placeholder: "2605.19561"
    validations:
      required: false

  - type: input
    id: title
    attributes:
      label: Paper title
    validations:
      required: true

  - type: dropdown
    id: bucket
    attributes:
      label: Suggested bucket (if applicable)
      options:
        - ptq
        - low_bits
        - qat
        - kv_cache
        - pruning_distill
        - diffusion
        - trending
        - survey
        - not sure
    validations:
      required: false

  - type: textarea
    id: reason
    attributes:
      label: Why
      description: |
        One or two sentences. For missed papers: what makes it in-scope (PTQ recipe, KV-cache compression, etc.). For wrongly-included: why it should hard_gate (e.g. it's a hardware paper, no LLM eval, RL-in-the-loop). For wrong-bucket: what bucket and why.
      placeholder: "PTQ recipe for Llama-3-70B, W4A4 with 128 calibration samples, beats QuaRot. Belongs in ptq."
    validations:
      required: true
