name: Feature request
description: New source, new bucket, new output format, scoring tweak, anything that changes what the pipeline does.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's missing or annoying today? Skip "wouldn't it be nice if…" — describe the concrete pain.
      placeholder: "OpenReview ICLR submissions show up too late; by the time the digest renders, the bidding window is over."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What you'd like the pipeline to do. Be specific about scope.
      placeholder: "Pull OpenReview ICLR `Submitted` (not just `Active`) at the start of each year's bid window; route to a new `iclr_under_review` bucket."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "Manually scanning OpenReview daily; using the existing arxiv source (most submissions aren't on arxiv yet)."
    validations:
      required: false
