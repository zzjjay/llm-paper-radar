name: Daily LLM Paper Radar

on:
  # Schedule disabled: this fork's filter/summarize stages target an internal
  # Anthropic proxy (llm-api.amd.com) that the GitHub-hosted runners can't
  # resolve from the public internet. The real scheduler is a host-side
  # crontab inside the AMD network — see scripts/daily.sh and the README.
  # Keeping workflow_dispatch so anyone forking with a public Anthropic key
  # can re-enable the schedule trivially.
  workflow_dispatch:
    inputs:
      backfill_days:
        description: 'Number of past days to backfill (max 2)'
        required: false
        default: '0'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        source: [arxiv, hf_daily]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - name: Fetch ${{ matrix.source }}
        run: uv run python -m sources.${{ matrix.source }} --backfill-days ${{ inputs.backfill_days || 0 }}
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: raw-${{ matrix.source }}
          path: data/raw/
          retention-days: 7
          if-no-files-found: ignore

  pipeline:
    needs: fetch
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - uses: actions/download-artifact@v4
        with:
          path: data/raw/
          merge-multiple: true
      - run: uv run python -m pipeline.dedupe --backfill-days ${{ inputs.backfill_days || 0 }}
      - run: uv run python -m pipeline.filter --backfill-days ${{ inputs.backfill_days || 0 }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_CUSTOM_HEADERS: ${{ secrets.ANTHROPIC_CUSTOM_HEADERS }}
      - run: uv run python -m pipeline.summarize --backfill-days ${{ inputs.backfill_days || 0 }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_CUSTOM_HEADERS: ${{ secrets.ANTHROPIC_CUSTOM_HEADERS }}
      - run: uv run python -m pipeline.render --backfill-days ${{ inputs.backfill_days || 0 }}
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-debug
          path: |
            data/deduped/
            data/scored/
          retention-days: 14
          if-no-files-found: ignore
      - name: Commit & push
        run: |
          git config user.name "llm-paper-radar[bot]"
          git config user.email "actions@github.com"
          git add digests/ README.md INDEX.md data/seen.json data/summarized/
          git diff --cached --quiet || git commit -m "📚 Daily digest $(date -u +%Y-%m-%d)"
          git push
      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "themeColor": "FF0000",
            "summary": "llm-paper-radar daily run failed",
            "sections": [{
              "activityTitle": "❌ llm-paper-radar daily run failed",
              "facts": [
                {"name": "Date", "value": "'$(date -u +%Y-%m-%d)'"},
                {"name": "Run", "value": "'${{ github.run_id }}'"}
              ]
            }],
            "potentialAction": [{
              "@type": "OpenUri",
              "name": "View run",
              "targets": [{"os": "default", "uri": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]
            }]
          }' "${{ secrets.TEAMS_WEBHOOK_URL }}"
