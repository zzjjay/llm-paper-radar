name: Daily LLM Paper Radar

on:
  schedule:
    - cron: '0 12 * * *'  # 12:00 UTC daily (06:00 MDT / 20:00 CST)
  workflow_dispatch:
    inputs:
      backfill_days:
        description: 'Number of past days to backfill (max 2)'
        required: false
        default: '0'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        source: [arxiv, hf_daily, reddit, semantic_scholar, twitter_rsshub]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - name: Fetch ${{ matrix.source }}
        run: uv run python -m sources.${{ matrix.source }} --backfill-days ${{ inputs.backfill_days || 0 }}
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          RSSHUB_BASE_URL: ${{ secrets.RSSHUB_BASE_URL }}
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: raw-${{ matrix.source }}
          path: data/raw/
          retention-days: 7
          if-no-files-found: ignore

  pipeline:
    needs: fetch
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - uses: actions/download-artifact@v4
        with:
          path: data/raw/
          merge-multiple: true
      - run: uv run python -m pipeline.dedupe --backfill-days ${{ inputs.backfill_days || 0 }}
      - name: Dump secrets context (keys only — GH masks values)
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          python3 -c "
          import json, os
          d = json.loads(os.environ['SECRETS_JSON'])
          print('available secret names:', sorted(d.keys()))
          for k in ('ANTHROPIC_API_KEY','ANTHROPIC_BASE_URL','ANTHROPIC_CUSTOM_HEADERS'):
              v = d.get(k)
              print(f'  {k}: {\"present (len=\" + str(len(v)) + \")\" if v else \"MISSING\"}')"
      - name: Probe Anthropic env (presence only, no values)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_CUSTOM_HEADERS: ${{ secrets.ANTHROPIC_CUSTOM_HEADERS }}
        run: |
          uv run python -c "
          import asyncio, os, traceback
          from anthropic import AsyncAnthropic
          api_key = os.environ.get('ANTHROPIC_API_KEY')
          print('len(api_key):', len(api_key) if api_key else None)
          print('len(BASE_URL):', len(os.environ.get('ANTHROPIC_BASE_URL') or ''))
          print('len(CUSTOM_HEADERS):', len(os.environ.get('ANTHROPIC_CUSTOM_HEADERS') or ''))
          c = AsyncAnthropic(api_key=api_key)
          print('client base_url repr:', repr(str(c.base_url)))
          print('default headers (keys only):', list(c.default_headers.keys()))
          async def go():
              try:
                  r = await c.messages.create(model='claude-haiku-4-5', max_tokens=20,
                      messages=[{'role':'user','content':'reply OK'}])
                  print('OK:', r.content[0].text[:40])
              except Exception:
                  traceback.print_exc()
          asyncio.run(go())
          "
      - run: uv run python -m pipeline.filter --backfill-days ${{ inputs.backfill_days || 0 }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_CUSTOM_HEADERS: ${{ secrets.ANTHROPIC_CUSTOM_HEADERS }}
      - run: uv run python -m pipeline.summarize --backfill-days ${{ inputs.backfill_days || 0 }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_CUSTOM_HEADERS: ${{ secrets.ANTHROPIC_CUSTOM_HEADERS }}
      - run: uv run python -m pipeline.render --backfill-days ${{ inputs.backfill_days || 0 }}
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-debug
          path: |
            data/deduped/
            data/scored/
          retention-days: 14
          if-no-files-found: ignore
      - name: Commit & push
        run: |
          git config user.name "llm-paper-radar[bot]"
          git config user.email "actions@github.com"
          git add digests/ README.md INDEX.md data/seen.json data/summarized/
          git diff --cached --quiet || git commit -m "📚 Daily digest $(date -u +%Y-%m-%d)"
          git push
      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "themeColor": "FF0000",
            "summary": "llm-paper-radar daily run failed",
            "sections": [{
              "activityTitle": "❌ llm-paper-radar daily run failed",
              "facts": [
                {"name": "Date", "value": "'$(date -u +%Y-%m-%d)'"},
                {"name": "Run", "value": "'${{ github.run_id }}'"}
              ]
            }],
            "potentialAction": [{
              "@type": "OpenUri",
              "name": "View run",
              "targets": [{"os": "default", "uri": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]
            }]
          }' "${{ secrets.TEAMS_WEBHOOK_URL }}"
