name: Upstream Sync

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 0点
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync from upstream
        run: |
          set -e
          git remote add upstream https://github.com/zhaolin-amd/llm-paper-radar.git
          git fetch upstream main
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
