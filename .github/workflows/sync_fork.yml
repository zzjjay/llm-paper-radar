name: Upstream Sync
on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 时间午夜 0 点自动同步
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
      
      - name: Sync Upstream
        uses: tgymnich/fork-sync@v1
        with:
          owner: 'zhaolin-amd'
          repo: 'llm-paper-radar'
          base: 'master' # 原仓库的主分支
          head: 'master' # 你 Fork 仓库的主分支
          token: ${{ secrets.GITHUB_TOKEN }}
