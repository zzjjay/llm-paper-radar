name: Weekly LLM Paper Digest

on:
  # Schedule disabled: the real weekly scheduler is a host-side crontab inside
  # the AMD network (scripts/weekly.sh), which pins --end-date to yesterday-UTC
  # for the correct Mon→Sun window. Leaving this Actions schedule on caused a
  # duplicate run with no --end-date that defaulted to now-UTC and, after the
  # job crossed midnight, produced wrong Wed→Tue windows (e.g. the deleted
  # weekly/20260527-20260602.md). Same rationale as daily.yml.
  # Keeping workflow_dispatch for manual reruns / public forks.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - run: uv run python -m pipeline.weekly
      - name: Commit
        run: |
          git config user.name "llm-paper-radar[bot]"
          git config user.email "actions@github.com"
          git add snapshots/weekly/ README.md
          git diff --cached --quiet || git commit -m "📅 Weekly digest $(date -u +%Y-W%U)"
          git push
