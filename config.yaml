sources:
  arxiv:
    enabled: true
    categories: [cs.CL, cs.LG, cs.AR]
  hf_daily:
    enabled: true
  reddit:
    enabled: true
    subreddit: LocalLLaMA
    top_window: day
  semantic_scholar:
    enabled: true
    seeds_file: seeds.yaml
    citation_window_days: 7
  twitter_rsshub:
    enabled: true
    accounts:
      - _akhaliq
      - Tim_Dettmers
      - HanLab_MIT
      - vllm_project
      - danielhanchen
      - tri_dao
      - omarsar0
  arxiv_authors:
    enabled: true
    window_days: 7
    categories: [cs.LG, cs.CL, cs.CV, cs.AR, stat.ML]
    authors:
      - name: Dan Alistarh
        affiliation: IST Austria
      - name: Song Han
        affiliation: MIT HAN Lab
      # Qualcomm AI Research (Amsterdam) — model efficiency / quantization group.
      # Some members have moved on (Tijmen Blankevoort → Apple, Christos Louizos → Apple);
      # listed here to keep their QC-era follow-ups on the radar.
      - name: Markus Nagel
        affiliation: Qualcomm AI Research
      - name: Mart van Baalen
        affiliation: Qualcomm AI Research
      - name: Yelysei Bondarenko
        affiliation: Qualcomm AI Research
      - name: Marios Fournarakis
        affiliation: Qualcomm AI Research
      - name: Andrey Kuzmin
        affiliation: Qualcomm AI Research
      - name: Arash Behboodi
        affiliation: Qualcomm AI Research
      - name: Babak Ehteshami Bejnordi
        affiliation: Qualcomm AI Research
      - name: Tijmen Blankevoort
        affiliation: Qualcomm AI Research (alumni)
      - name: Christos Louizos
        affiliation: Qualcomm AI Research (alumni)

filter:
  model: claude-haiku-4-5
  threshold: 7
  concurrency: 50

summarize:
  model: claude-sonnet-4-6
  concurrency: 20

render:
  truncate_after: 10
  topic_caps:
    ptq: 3
    _default: 2

dedupe:
  cross_day_strategy: lenient
  source_priority:
    - hf_daily
    - reddit
    - semantic_scholar
    - twitter_rsshub
    - arxiv_authors
    - arxiv
