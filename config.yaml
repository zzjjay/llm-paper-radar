sources:
  arxiv:
    enabled: true
    categories: [cs.CL, cs.LG, cs.AR]
  hf_daily:
    enabled: true
  reddit:
    enabled: true
    subreddit: LocalLLaMA
    top_window: day
  semantic_scholar:
    enabled: true
    seeds_file: seeds.yaml
    citation_window_days: 7
  twitter_rsshub:
    enabled: true
    accounts:
      - _akhaliq
      - Tim_Dettmers
      - HanLab_MIT
      - vllm_project
      - danielhanchen
      - tri_dao
      - omarsar0

filter:
  model: claude-haiku-4-5
  threshold: 7
  concurrency: 50

summarize:
  model: claude-sonnet-4-6
  concurrency: 20

render:
  truncate_after: 10
  topic_caps:
    ptq: 3
    _default: 2

dedupe:
  cross_day_strategy: lenient
  source_priority:
    - hf_daily
    - reddit
    - semantic_scholar
    - twitter_rsshub
    - arxiv
