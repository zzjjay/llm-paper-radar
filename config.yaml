sources:
  arxiv:
    enabled: true
    categories: [cs.CL, cs.LG, cs.AR]
  hf_daily:
    enabled: true
  openreview:
    enabled: true
    window_days: 7
    # `{year}` is auto-expanded to the current and next calendar year (a venue's
    # CFP window typically straddles both: e.g. in 2026 OpenReview hosts ICLR
    # 2026 papers being reviewed and ICLR 2027 papers just opened). Fetcher
    # appends `/-/Submission` and silently skips venues that don't exist yet,
    # so you never need to bump years by hand. Pin a specific year by writing
    # it literally (no `{year}`). Add NeurIPS.cc/{year}/Conference,
    # ICML.cc/{year}/Conference, COLM.cc/{year}/Conference, etc. as they open.
    # ACL main track now flows through ARR (`aclweb.org/ACL/ARR/<yr>/<month>`)
    # — swap in if `aclweb.org/ACL/{year}/Conference` stays empty.
    venues:
      - ICLR.cc/{year}/Conference
      - MLSys.org/{year}/Conference
      - aclweb.org/ACL/{year}/Conference
  arxiv_authors:
    enabled: true
    window_days: 7
    categories: [cs.LG, cs.CL, cs.CV, cs.AR, stat.ML]
    authors:
      - name: Dan Alistarh
        affiliation: IST Austria
      - name: Song Han
        affiliation: MIT HAN Lab
      # Qualcomm AI Research (Amsterdam) — model efficiency / quantization group.
      # Some members have moved on (Tijmen Blankevoort → Apple, Christos Louizos → Apple);
      # listed here to keep their QC-era follow-ups on the radar.
      - name: Markus Nagel
        affiliation: Qualcomm AI Research
      - name: Mart van Baalen
        affiliation: Qualcomm AI Research
      - name: Yelysei Bondarenko
        affiliation: Qualcomm AI Research
      - name: Marios Fournarakis
        affiliation: Qualcomm AI Research
      - name: Andrey Kuzmin
        affiliation: Qualcomm AI Research
      - name: Arash Behboodi
        affiliation: Qualcomm AI Research
      - name: Babak Ehteshami Bejnordi
        affiliation: Qualcomm AI Research
      - name: Tijmen Blankevoort
        affiliation: Qualcomm AI Research (alumni)
      - name: Christos Louizos
        affiliation: Qualcomm AI Research (alumni)

filter:
  model: claude-sonnet-4-6
  concurrency: 50
  # Cheap keyword prefilter that runs before the LLM judge. Papers with
  # no whitelist hits AND >= max_blacklist_hits blacklist matches are
  # hard-gated locally — no Sonnet call. Word-boundary matching: "QuIP"
  # will not match inside "equipping". Tune weights based on
  # data/curation/rejected.jsonl over time.
  prefilter:
    enabled: true
    max_blacklist_hits: 2
    whitelist:
      # core terms
      - { pattern: "post-training quantization", weight: 6 }
      - { pattern: "PTQ",                        weight: 6 }
      - { pattern: "weight-only quantization",   weight: 5 }
      - { pattern: "activation quantization",    weight: 5 }
      - { pattern: "low-bit quantization",       weight: 6 }
      - { pattern: "1-bit",                      weight: 6 }
      - { pattern: "1.58-bit",                   weight: 6 }
      - { pattern: "2-bit",                      weight: 5 }
      - { pattern: "ternary",                    weight: 4 }
      - { pattern: "binary",                     weight: 3 }
      # schemes / datatypes
      - { pattern: "W4A16", weight: 5 }
      - { pattern: "W4A4",  weight: 6 }
      - { pattern: "W4A8",  weight: 5 }
      - { pattern: "W8A8",  weight: 4 }
      - { pattern: "INT4",  weight: 4 }
      - { pattern: "FP4",   weight: 5 }
      - { pattern: "FP8",   weight: 4 }
      - { pattern: "MXFP4", weight: 6 }
      - { pattern: "MXFP6", weight: 5 }
      - { pattern: "NVFP4", weight: 6 }
      - { pattern: "MXINT", weight: 4 }
      - { pattern: "microscaling",        weight: 4 }
      - { pattern: "block floating point", weight: 4 }
      # named methods
      - { pattern: "GPTQ",        weight: 4 }
      - { pattern: "AWQ",         weight: 4 }
      - { pattern: "SmoothQuant", weight: 4 }
      - { pattern: "OmniQuant",   weight: 3 }
      - { pattern: "QuaRot",      weight: 4 }
      - { pattern: "SpinQuant",   weight: 4 }
      - { pattern: "QuIP",        weight: 4 }
      - { pattern: "AQLM",        weight: 4 }
      - { pattern: "VPTQ",        weight: 4 }
      - { pattern: "BitNet",      weight: 4 }
      - { pattern: "QServe",      weight: 4 }
      - { pattern: "KIVI",        weight: 4 }
      - { pattern: "KVQuant",     weight: 4 }
      - { pattern: "Wanda",       weight: 3 }
      - { pattern: "SparseGPT",   weight: 3 }
      # KV cache
      - { pattern: "KV cache quantization", weight: 5 }
      - { pattern: "KV-cache quantization", weight: 5 }
      - { pattern: "KV compression",        weight: 3 }
      # deployability proxies (cheap signals)
      - { pattern: "calibration",   weight: 2 }
      - { pattern: "no retraining", weight: 3 }
      - { pattern: "training-free", weight: 3 }
      - { pattern: "data-free",     weight: 2 }
    blacklist:
      - { pattern: "image classification",  weight: -4 }
      - { pattern: "object detection",      weight: -4 }
      - { pattern: "semantic segmentation", weight: -4 }
      - { pattern: "ImageNet",              weight: -3 }
      - { pattern: "CIFAR",                 weight: -4 }
      - { pattern: "federated learning",    weight: -4 }
      - { pattern: "speech recognition",    weight: -3 }
      - { pattern: "graph neural network",  weight: -4 }
      - { pattern: "agent framework",       weight: -3 }
      - { pattern: "RAG",                   weight: -3 }
      - { pattern: "retrieval-augmented",   weight: -3 }
      - { pattern: "BERT-base",             weight: -3 }
      - { pattern: "BERT-large",            weight: -3 }
      - { pattern: "machine translation",   weight: -2 }
      - { pattern: "convergence proof",     weight: -2 }
      - { pattern: "self-explanation",       weight: -3 }
      - { pattern: "self-explanations",      weight: -3 }
      # Video diffusion / world models — out of scope (diffusion bucket is
      # for image diffusion / flow-matching backbones only).
      - { pattern: "video diffusion",       weight: -4 }
      - { pattern: "video generation",      weight: -3 }
      - { pattern: "world model",           weight: -4 }
      - { pattern: "any-step",              weight: -3 }
      - { pattern: "flow map",              weight: -3 }

summarize:
  model: claude-opus-4-7
  concurrency: 20

render:
  truncate_after: 10
  # No more numeric threshold gate — every paper with hard_gate=false
  # surfaces, ranked by composite (topic_relevance + practicality) and
  # capped per bucket below.
  topic_caps:
    ptq: 8
    low_bits: 5
    qat: 5
    kv_cache: 5
    pruning_distill: 3
    diffusion: 3
    trending: 3   # render-only manual-override bucket (e.g. Orthrus, DFlash)
    survey: 3
    _default: 2

dedupe:
  cross_day_strategy: lenient
  source_priority:
    - hf_daily
    - openreview
    - arxiv_authors
    - arxiv
